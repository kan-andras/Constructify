</head>
<body>
    <nav>

        <div id="nav_jobboldal">

        <div class="munkas"><img src="images/munkatars1.png" alt="accountlogo_Feher" class="munka_profilkep modalKepTrigger" data-nev="Kiss Péter" data-leiras="Építészmérnök, 10 év tapasztalattal." data-kep="images/Account_feher.png"></div>
        <div class="munkas"><img src="images/munkatars2.png" alt="accountlogo_Feher" class="munka_profilkep modalKepTrigger" data-nev="Kovács Elemér" data-leiras="Építészmérnök, 15 év tapasztalattal." data-kep="images/Account_feher.png"></div>

            <a href="https://www.facebook.com" class="social-link2"><img src="images/facebook.png" alt="facebook"></a>
            <a href="https://www.youtube.com" class="social-link3"><img src="images/youtube.png" alt="youtube"></a>
            <a href="https://x.com/?lang=hu" class="social-link4"><img src="images/twitter.png" alt="twitter"></a>

    <div id="modal1" class="modal">
